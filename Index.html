<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spinach The Cow — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0D0D0D;
      --teal:  #00D2BE;
      --white: #EFEFEF;
      --dim:   #5A5A5A;
    }

    html, body {
      width: 100%; height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── PARTICLE CANVAS ───────────────────────────── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GLOW ORBS ─────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,210,190,0.18) 0%, transparent 70%);
      top: -150px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,210,190,0.10) 0%, transparent 70%);
      bottom: -100px; right: -80px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0); }
      to   { transform: translate(60px, 80px); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0); }
      to   { transform: translate(-50px, -60px); }
    }

    /* ── MAIN CONTENT ──────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── LOGO ──────────────────────────────────────── */
    .logo-wrap {
      position: relative;
      margin-bottom: 2.5rem;
    }

    /* Teal glow ring behind logo */
    .logo-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,210,190,0.15) 0%, transparent 65%);
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1);   opacity: 0.7; }
      50%       { transform: scale(1.1); opacity: 1;   }
    }

    .logo {
      width: clamp(140px, 28vw, 220px);
      height: auto;
      position: relative;
      z-index: 1;
      animation: logoIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
      filter: drop-shadow(0 0 24px rgba(0,210,190,0.25));
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── BRAND NAME ────────────────────────────────── */
    .brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--white);
      animation: fadeUp 1s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
      margin-bottom: 0.5rem;
    }

    .brand em {
      font-style: normal;
      color: var(--teal);
    }

    /* ── COMING SOON BADGE ─────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: 1px solid rgba(0,210,190,0.3);
      border-radius: 2px;
      padding: 0.4em 1.1em;
      margin: 1.5rem 0 2rem;
      animation: fadeUp 1s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .badge-text {
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--teal);
    }

    /* ── QUOTE ─────────────────────────────────────── */
    .quote-wrap {
      animation: fadeUp 1s 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      max-width: 420px;
    }

    .quote {
      font-size: clamp(0.85rem, 2.2vw, 1rem);
      font-weight: 300;
      font-style: italic;
      color: #888;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .quote-attr {
      margin-top: 0.6rem;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── 44 WATERMARK ──────────────────────────────── */
    .ham44 {
      position: fixed;
      top: -0.15em;
      right: -0.05em;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(8rem, 20vw, 16rem);
      line-height: 1;
      color: rgba(0,210,190,0.04);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* ── TEAL SCAN LINE ────────────────────────────── */
    .scanline {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,210,190,0.4) 50%, transparent 100%);
      animation: scan 6s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes scan {
      from { top: -2px; opacity: 0.6; }
      80%  { opacity: 0.6; }
      to   { top: 100vh; opacity: 0; }
    }

    /* ── BOTTOM DOMAIN ─────────────────────────────── */
    .domain {
      position: fixed;
      bottom: 4.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2e2e2e;
      z-index: 1;
      animation: fadeUp 1s 1s cubic-bezier(0.22, 1, 0.36, 1) both;
      white-space: nowrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── F1 BAR ────────────────────────────────────── */
    .f1-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,210,190,0.15);
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      animation: fadeUp 1s 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .f1-bar-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .f1-bar-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: blink 2s ease-in-out infinite;
    }

    .f1-stats {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      flex-wrap: wrap;
    }

    .f1-stat {
      display: flex;
      align-items: baseline;
      gap: 0.45rem;
    }

    .f1-stat-label {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5a5a5a;
    }

    .f1-stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .f1-stat-pts {
      font-size: 0.65rem;
      color: var(--teal);
      font-weight: 500;
    }

    .f1-divider {
      width: 1px;
      height: 1.1rem;
      background: #222;
      flex-shrink: 0;
    }

    @media (max-width: 520px) {
      .f1-bar { gap: 1rem; padding: 0.7rem 1.25rem; }
      .f1-stats { gap: 1rem; }
      .f1-divider { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="ham44">44</div>

  <!-- Ambient glow orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Particle canvas -->
  <canvas id="particles"></canvas>

  <!-- Scan line -->
  <div class="scanline"></div>

  <!-- Main content -->
  <div class="container">

    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img
        class="logo"
        src="https://github.com/webgenerations77/stc/blob/main/Logo.png?raw=true"
        alt="Spinach The Cow"
      />
    </div>

    <h1 class="brand">Spinach <em>The Cow</em></h1>

    <div class="badge">
      <span class="badge-dot"></span>
      <span class="badge-text">Coming Soon</span>
    </div>

    <div class="quote-wrap">
      <p class="quote">"Be curious, not judgmental."</p>
      <p class="quote-attr">— Walt Whitman</p>
    </div>

  </div>

  <p class="domain">spinachthecow.com</p>

  <!-- F1 STATUS BAR -->
  <div class="f1-bar">
    <div class="f1-bar-label">
      <span class="f1-bar-dot"></span>
      Mercedes F1 &middot; 2026 Season
    </div>
    <div class="f1-stats">
      <div class="f1-stat">
        <span class="f1-stat-label">Constructors</span>
        <span class="f1-stat-value">P1</span>
        <span class="f1-stat-pts">262 pts</span>
      </div>
      <div class="f1-divider"></div>
      <div class="f1-stat">
        <span class="f1-stat-label">Antonelli</span>
        <span class="f1-stat-value">P1</span>
        <span class="f1-stat-pts">156 pts</span>
      </div>
      <div class="f1-divider"></div>
      <div class="f1-stat">
        <span class="f1-stat-label">Russell</span>
        <span class="f1-stat-value">P3</span>
        <span class="f1-stat-pts">106 pts</span>
      </div>
      <div class="f1-divider"></div>
      <div class="f1-stat">
        <span class="f1-stat-label">Last Race · <span style="color:var(--white)">Spanish GP</span></span>
        <span class="f1-stat-value" style="color:#E8002D">Hamilton · Ferrari</span>
        <span class="f1-stat-pts">115 pts</span>
      </div>
    </div>
  </div>

  <script>
    // ── Floating particles ──────────────────────────────
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');

    let W, H, particles = [];

    const TEAL = '0,210,190';
    const COUNT = 55;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function makeParticle() {
      return {
        x:     rand(0, W),
        y:     rand(0, H),
        r:     rand(0.6, 2.2),
        vx:    rand(-0.18, 0.18),
        vy:    rand(-0.22, -0.06),
        alpha: rand(0.05, 0.35),
        da:    rand(0.003, 0.008) * (Math.random() > 0.5 ? 1 : -1),
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: COUNT }, makeParticle);
    }

    function tick() {
      ctx.clearRect(0, 0, W, H);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha += p.da;

        if (p.alpha <= 0.03 || p.alpha >= 0.38) p.da *= -1;
        if (p.y < -10) { p.y = H + 10; p.x = rand(0, W); }
        if (p.x < -10 || p.x > W + 10) p.x = rand(0, W);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${TEAL},${p.alpha})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    window.addEventListener('resize', resize);
    init();
    tick();
  </script>

</body>
</html>
